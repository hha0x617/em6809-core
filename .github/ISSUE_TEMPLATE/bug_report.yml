name: Bug report
description: Report a wrong instruction result, a crash, or unexpected behaviour in em6809-core
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.  Reproducibility
        is the single most important detail — a minimal assembly or
        ROM snippet helps enormously.

        **GUI / settings / console-window bugs belong on the
        [em6809](https://github.com/hha0x617/em6809) repo, not
        here.**  This repo holds the headless emulator core only.

  - type: input
    id: version
    attributes:
      label: em6809-core commit hash
      description: Commit SHA your build is pinned to (consumers usually pin this in `Cargo.toml`).
      placeholder: 185a39f439b72791cf121dc68c83f1e764c8a6d5
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: How was em6809-core being used?
      options:
        - As a Rust library, called from my own code
        - Via em6809 (the GUI app)
        - Via the emfe MC6809 plugin
        - Tests / CI
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2 x64
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce (minimal assembly / ROM welcome)
      placeholder: |
        ```
        ORG $1000
        LDA #$80
        SBCA #$01       ; borrow-in handling
        STA $2000
        ```
        Expected A = $7E, observed A = $7F
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / register dumps / disassembly excerpts
      render: shell
